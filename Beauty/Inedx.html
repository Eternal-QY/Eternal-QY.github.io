          <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>✨ Sweet Memories ✨</title>
    <style>
        /* 引入字体 */
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=ZCOOL+KuaiLe&display=swap');

        :root {
            --bg-color: #fff0f5; 
            --card-bg: #ffffff;
            --accent-color: #ffb7b2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#ffdde1 20%, transparent 20%), radial-gradient(#ffdde1 20%, transparent 20%);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            font-family: 'ZCOOL KuaiLe', cursive, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 背景装饰容器 */
        .background-decor {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1; overflow: hidden;
        }
        .floating-item {
            position: absolute; bottom: -50px;
            animation: floatUp 15s linear infinite;
            opacity: 0.6; font-size: 24px;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        header {
            text-align: center; padding: 40px 20px 20px;
            color: #ff6f91; text-shadow: 2px 2px 0px #fff;
        }
        h1 { font-family: 'Pacifico', cursive; font-size: 3.5rem; margin-bottom: 10px; }
        p.subtitle {
            font-size: 1.2rem; color: #888; background: rgba(255,255,255,0.6);
            display: inline-block; padding: 5px 15px; border-radius: 20px;
        }

        /* 瀑布流容器 */
        .gallery-container {
            width: 95%; max-width: 1200px; margin: 20px auto;
            column-count: 4; column-gap: 20px;
        }

        .photo-card {
            background: var(--card-bg); border-radius: 10px;
            padding: 10px 10px 30px 10px; margin-bottom: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: all 0.4s; break-inside: avoid;
            position: relative; cursor: pointer;
            transform: rotate(0deg); opacity: 0; animation: fadeIn 0.8s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        .photo-card:hover {
            transform: scale(1.05) rotate(0deg) !important;
            box-shadow: 0 15px 30px rgba(255, 111, 145, 0.3); z-index: 10;
        }
        .photo-card img { width: 100%; border-radius: 4px; display: block; }
        
        /* 胶带效果 */
        .photo-card::before {
            content: ''; position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%); width: 80px; height: 25px;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .caption {
            text-align: center; margin-top: 10px; font-size: 1rem;
            color: #555; font-family: 'Pacifico', cursive;
        }

        /* 灯箱 */
        .lightbox {
            display: none; position: fixed; z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 240, 245, 0.95);
            justify-content: center; align-items: center; flex-direction: column;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .lightbox.active { display: flex; opacity: 1; }
        .lightbox img {
            max-width: 90%; max-height: 80vh; border-radius: 10px;
            border: 10px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        .close-btn {
            margin-top: 20px; font-size: 2rem; color: #ff6f91;
            cursor: pointer; background: white; width: 50px; height: 50px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
        }

        footer { text-align: center; padding: 40px; color: #aaa; font-size: 0.9rem; }

        @media (max-width: 1024px) { .gallery-container { column-count: 3; } }
        @media (max-width: 768px) { .gallery-container { column-count: 2; h1 { font-size: 2.5rem; } } }
        @media (max-width: 480px) { .gallery-container { column-count: 1; width: 90%; } }
    </style>
</head>
<body>

    <div class="background-decor" id="bgDecor"></div>

    <header>
        <h1>My Lovely Moments</h1>
        <p class="subtitle">✨ 记录每一个闪闪发光的瞬间 ✨</p>
    </header>

    <div class="gallery-container" id="gallery"></div>

    <footer>Made with ❤️ for a Lovely Girl</footer>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Full View">
        <div class="close-btn">×</div>
    </div>

    <script>
        // ==========================================
        // ✨ 在这里添加新照片 ✨
        // 格式：{ img: '图片文件名', text: '你的文案' },
        // ==========================================
        const photos = [
            { img: '1.jpg', text: 'Golden Days 🍂' },
            { img: '2.jpg', text: 'So Chill ~' },
            { img: '3.jpg', text: 'Hello Winter ❄️' },
            { img: '4.jpg', text: 'Snow Day ⛄' },
            { img: '5.jpg', text: 'Magical Night ✨' },
            { img: '6.jpg', text: 'Little Duck! 🦆' },
            { img: '7.jpg', text: 'OOTD 💖' },
            { img: '8.jpg', text: 'A Beautiful Day 🐰' },
            { img: '9.jpg', text: 'Party Time 🎈' },
            { img: '10.jpg', text: 'Sweet Tooth 🍓' },
            { img: '11.jpg', text: 'Little Duck! 🦆' }, 
            { img: '12.jpg', text: 'Racing！' }, 
            { img: '13.jpg', text: 'Cheese🧀' },
            { img: '14.jpg', text: 'cool girl' },
            { img: '15.jpg', text: 'cocacola' },
            { img: '16.jpg', text: 'good evening' },
            { img: '17.jpg', text: 'Scarf🧣' },
            { img: '18.jpg', text: '📷&🍔' },
            { img: '19.jpg', text: 'Strawberry cake🍰' },
            { img: '20.jpg', text: 'Aranya&🥧' },
            { img: '21.jpg', text: 'luckin☕' },
            { img: '22.jpg', text: 'snake🐍' },
            { img: '23.jpg', text: '✌' },
            // 👇 在下面这行添加新照片，比如：
            // { img: '11.jpg', text: '这是新照片哦' },
            // { img: '12.jpg', text: '另一张美照' },
        ];

        // ==========================================
        // 下面的代码不需要动哦，它会自动生成网页
        // ==========================================

        const gallery = document.getElementById('gallery');

        // 自动生成卡片函数
        photos.forEach((photo, index) => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            
            // 随机旋转一点点，更自然
            const randomRotation = Math.random() * 4 - 2; // -2deg 到 2deg
            card.style.transform = `rotate(${randomRotation}deg)`;
            
            // 点击事件
            card.onclick = () => openLightbox(photo.img);

            // 填充内容
            card.innerHTML = `
                <img src="${photo.img}" alt="${photo.text}">
                <div class="caption">${photo.text}</div>
            `;
            
            gallery.appendChild(card);
        });

        // 悬停效果复位（因为JS覆盖了transform，需要用JS辅助hover，或者CSS !important）
        // CSS中已经加了 !important 来处理hover时的旋转归零

        // 漂浮背景动画
        const decorContainer = document.getElementById('bgDecor');
        const symbols = ['🌸', '💖', '✨', '🎀', '🍓', '❄️'];
        function createFloatingItem() {
            const item = document.createElement('div');
            item.classList.add('floating-item');
            item.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = (Math.random() * 10 + 10) + 's';
            item.style.fontSize = (Math.random() * 20 + 15) + 'px';
            decorContainer.appendChild(item);
            setTimeout(() => item.remove(), 20000);
        }
        for(let i=0; i<15; i++) createFloatingItem();
        setInterval(createFloatingItem, 1000);

        // 灯箱控制
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('active');
        }
        function closeLightbox() {
            lightbox.classList.remove('active');
        }
    </script>
</body>
</html>

<script>
  window.addEventListener('tabs:register', () => {
    let { activeClass } = CONFIG.comments;
    if (CONFIG.comments.storage) {
      activeClass = localStorage.getItem('comments_active') || activeClass;
    }
    if (activeClass) {
      let activeTab = document.querySelector(`a[href="#comment-${activeClass}"]`);
      if (activeTab) {
        activeTab.click();
      }
    }
  });
  if (CONFIG.comments.storage) {
    window.addEventListener('tabs:click', event => {
      if (!event.target.matches('.tabs-comment .tab-content .tab-pane')) return;
      let commentClass = event.target.classList[1];
      localStorage.setItem('comments_active', commentClass);
    });
  }
</script>
