        /* 类型2：彩色回形针 (左上角) */
        .deco-clip {

            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23a1c4fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>') no-repeat center/contain;

        /* 类型3：可爱贴纸 (右下角) */

        .caption::after {
            content: ''; display: block; width: 40px; height: 3px;
            background: var(--accent-pink); margin: 8px auto 0;
            border-radius: 2px; opacity: 0.5;
        }

        /* 灯箱 (高级毛玻璃效果) */
        .lightbox {
            display: none; position: fixed; z-index: 1000;

<body>

    <div class="string-lights"></div>
    <div class="background-decor" id="bgDecor"></div>

    <header>
        <h1>🍓 My Sweet Journal 🍓</h1>
        <p class="subtitle">✨ 收集每一个闪闪发光的瞬间 ✨</p>
    </header>

    <div class="gallery-container" id="gallery"></div>

    <footer>Made with 💖 & Lots of Love</footer>

    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <img id="lightbox-img" src="" alt="Full View" onclick="event.stopPropagation()">
        <div class="close-btn">×</div>
    </div>

    <script>
        // ==========================================
        // ✨ 照片配置区域 ✨
        // ==========================================
        const photos = [
            { img: '1.jpg', text: 'Golden Days 🍂' },
            { img: '2.jpg', text: 'So Chill ~' },
            { img: '3.jpg', text: 'Hello Winter ❄️' },
            { img: '4.jpg', text: 'Snow Day ⛄' },
            { img: '5.jpg', text: 'Magical Night ✨' },
            { img: '6.jpg', text: 'Little Duck! 🦆' },
            { img: '7.jpg', text: 'OOTD 💖' },
            { img: '8.jpg', text: 'A Beautiful Day 🐰' },
            { img: '9.jpg', text: 'Party Time 🎈' },
            { img: '10.jpg', text: 'Sweet Tooth 🍓' },
            { img: '11.jpg', text: 'Little Duck! 🦆' }, 
            { img: '12.jpg', text: 'Racing！' }, 
            { img: '13.jpg', text: 'Cheese🧀' },
            { img: '14.jpg', text: 'cool girl' },
           { img: '15.jpg', text: 'cocacola' },
           { img: '16.jpg', text: 'good evening' },

        ];

        // ==========================================
        // 页面生成逻辑
        // ==========================================

        const gallery = document.getElementById('gallery');
        const stickerEmojis = ['🍓', '💖', '✨', '🎀', '🧀', '🐰', '🍒', '🍭'];

        photos.forEach((photo, index) => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            // 增加Q弹入场的延迟，形成错落感
            card.style.animationDelay = `${index * 0.1}s`;
            
            // 随机基础旋转
            const randomRotation = Math.random() * 6 - 3;
            card.style.transform = `rotate(${randomRotation}deg) scale(0.9)`;
            
            card.onclick = () => openLightbox(photo.img);

            // --- ✨ 随机添加一种装饰 ✨ ---
            const decoType = Math.floor(Math.random() * 3); // 0, 1, or 2
            let decoHTML = '';
            if (decoType === 0) {
                // 胶带
                decoHTML = '<div class="deco-item deco-tape"></div>';
            } else if (decoType === 1) {
                // 回形针 (随机颜色，通过改变 SVG stroke)
                const colors = ['%23a1c4fd', '%23ff9a9e', '%23fbc2eb', '%23fdcbf1'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                // 这里需要重新构建带颜色的SVG，稍微复杂点，为了简化直接用CSS filter变色
                decoHTML = `<div class="deco-item deco-clip" style="filter: hue-rotate(${Math.random()*360}deg) drop-shadow(2px 3px 2px rgba(0,0,0,0.1));"></div>`;
            } else {
                // 贴纸
                const randomSticker = stickerEmojis[Math.floor(Math.random() * stickerEmojis.length)];
                decoHTML = `<div class="deco-item deco-sticker">${randomSticker}</div>`;
            }
            // ---------------------------

            card.innerHTML = `
                ${decoHTML}
                <img src="${photo.img}" alt="${photo.text}">
                <div class="caption">${photo.text}</div>
            `;
            
            gallery.appendChild(card);
        });

        // 背景漂浮动画
        const decorContainer = document.getElementById('bgDecor');
        const symbols = ['🌸', '💖', '✨', '🎀', '🍓', '❄️', '🧸'];
        function createFloatingItem() {
            const item = document.createElement('div');
            item.classList.add('floating-item');
            item.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = (Math.random() * 10 + 15) + 's';
            item.style.fontSize = (Math.random() * 25 + 15) + 'px';
            decorContainer.appendChild(item);
            setTimeout(() => item.remove(), 25000);
        }
        for(let i=0; i<20; i++) createFloatingItem();
        setInterval(createFloatingItem, 1200);

        // 灯箱控制
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // 防止背景滚动
        }
        function closeLightbox(event) {
            // 只有点击背景或关闭按钮时才关闭，点击图片本身不关闭
            if (event.target !== lightboxImg) {
                 lightbox.classList.remove('active');
                 document.body.style.overflow = 'auto';
            }
        }
    </script>
</body>

      activeClass = localStorage.getItem('comments_active') || activeClass;
    }
    if (activeClass) {
      let activeTab = document.querySelector(`a[href="#comment-${activeClass}"]`);
      if (activeTab) {
        activeTab.click();
      }
    }
  });
  if (CONFIG.comments.storage) {
    window.addEventListener('tabs:click', event => {
      if (!event.target.matches('.tabs-comment .tab-content .tab-pane')) return;
      let commentClass = event.target.classList[1];
      localStorage.setItem('comments_active', commentClass);
    });
  }
</script>
